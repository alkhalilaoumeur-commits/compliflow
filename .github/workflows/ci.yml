name: CI

on:
  push:
    branches: [main, frontend-ui]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          DOI_SECRET: "ci-test-secret"
